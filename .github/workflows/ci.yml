# Nom du workflow affiché dans GitHub Actions
name: CI - Build & Test

# "on" = quand le pipeline doit démarrer
on:

  # Le workflow démarre quand on fait un push
  push:

    # branches concernées
    # si quelqu’un push sur main ou develop → pipeline démarre
    branches: [ main, develop , dev ]

  # pull_request = quand quelqu’un crée/modifie une PR
  pull_request:

    # seulement les PR vers main
    branches: [ main ]

# Début des jobs
jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 : Build & Test (Maven)
  # ─────────────────────────────────────────────────────────────

  # Nom technique du job
  build-and-test:

    # Nom visible dans GitHub Actions
    name: Build & Test (Java 17)

    # Machine utilisée par GitHub
    # ubuntu-latest = dernière version Ubuntu Linux
    runs-on: ubuntu-latest

    # services = conteneurs Docker temporaires
    # utilisés pendant le job
    services:

      # Service MySQL
      mysql:

        # Image Docker utilisée
        image: mysql:8.0

        # Variables d’environnement pour MySQL
        env:

          # Mot de passe du compte root MySQL
          MYSQL_ROOT_PASSWORD: eya2024

          # Base créée automatiquement
          MYSQL_DATABASE: lms_platform

        # Ports ouverts
        # format : port_machine:port_container
        ports:
          - 3306:3306

        # Options supplémentaires Docker
        options: >-

          # Commande pour vérifier que MySQL fonctionne
          --health-cmd="mysqladmin ping -h localhost"

          # Vérification toutes les 10 secondes
          --health-interval=10s

          # Timeout après 5 secondes
          --health-timeout=5s

          # Réessaie 5 fois avant erreur
          --health-retries=5

      # Service MongoDB
      mongodb:

        # Image Docker MongoDB version 7
        image: mongo:7.0

        # Port MongoDB
        ports:
          - 27017:27017

        # Vérification état MongoDB
        options: >-

          # Commande ping MongoDB
          --health-cmd="mongosh --eval 'db.adminCommand({ping:1})'"

          # Vérifie toutes les 10 sec
          --health-interval=10s

          # Timeout 5 sec
          --health-timeout=5s

          # Réessaie 5 fois
          --health-retries=5

    # Liste des étapes du job
    steps:

      # Étape : récupérer le code GitHub
      - name: Checkout code

        # Action GitHub officielle
        uses: actions/checkout@v4

      # Étape : installer Java
      - name: Set up JDK 17

        # Action officielle setup-java
        uses: actions/setup-java@v4

        # Paramètres de l’action
        with:

          # Version Java
          java-version: '17'

          # Distribution Java
          # temurin = Eclipse Temurin
          distribution: 'temurin'

          # Active cache Maven
          # accélère les builds futurs
          cache: maven

      # Étape : build + tests
      - name: Build and run tests

        # Variables d’environnement utilisées par Spring Boot
        env:

          # URL connexion MySQL
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/lms_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

          # Username MySQL
          SPRING_DATASOURCE_USERNAME: root

          # Password MySQL
          SPRING_DATASOURCE_PASSWORD: eya2024

          # URL MongoDB
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/lms_ai_logs

          # Secret JWT stocké dans GitHub Secrets
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

          # Host SMTP Gmail
          SPRING_MAIL_HOST: smtp.gmail.com

          # Port SMTP
          SPRING_MAIL_PORT: 587

          # Username email
          SPRING_MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}

          # Password email
          SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

          # Secret Stripe
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

          # Google OAuth Client ID
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

          # Google OAuth Secret
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

          # Secret service reconnaissance faciale
          FACE_SERVICE_SECRET: ${{ secrets.FACE_SERVICE_SECRET }}

        # Commande exécutée
        run: mvn -B verify --file pom.xml

        # mvn = lance Maven
        # -B = batch mode (mode CI/CD)
        # verify = compile + tests + validations
        # --file pom.xml = utilise ce pom.xml

      # Étape upload résultats tests
      - name: Upload test results

        # always() = même si le job échoue
        if: always()

        # Action GitHub upload artifact
        uses: actions/upload-artifact@v7

        # Paramètres upload
        with:

          # Nom artifact
          name: test-results

          # Dossier contenant résultats tests
          path: target/surefire-reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 2 : Code Quality (SonarCloud)
  # ─────────────────────────────────────────────────────────────

  # Nom technique du job
  sonar:

    # Nom visible GitHub
    name: SonarCloud Analysis

    # Machine Ubuntu
    runs-on: ubuntu-latest

    # needs = attend que build-and-test termine
    needs: build-and-test

    # Condition lancement
    # seulement PR ou branche main
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    # Services nécessaires
    services:

      # MySQL
      mysql:

        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: eya2024
          MYSQL_DATABASE: lms_platform

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # MongoDB
      mongodb:

        image: mongo:7.0

        ports:
          - 27017:27017

        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # Étapes du job
    steps:

      # Télécharger code GitHub
      - name: Checkout code

        uses: actions/checkout@v4

        with:

          # fetch-depth 0
          # récupère historique Git complet
          # nécessaire pour SonarCloud
          fetch-depth: 0

      # Installer Java 17
      - name: Set up JDK 17

        uses: actions/setup-java@v4

        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build + analyse SonarCloud
      - name: Build with coverage + SonarCloud

        env:

          # Token GitHub
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Token SonarCloud
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

          # Variables Spring Boot
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/lms_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: eya2024
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/lms_ai_logs

          # Secrets application
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SPRING_MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FACE_SERVICE_SECRET: ${{ secrets.FACE_SERVICE_SECRET }}

        # Commande Maven
        run: >

          # verify = compile + tests
          mvn -B verify sonar:sonar

          # Clé projet SonarCloud
          -Dsonar.projectKey=Eyayounsi_lms-backend

          # Organisation SonarCloud
          -Dsonar.organization=eyayounsi

          # URL SonarCloud
          -Dsonar.host.url=https://sonarcloud.io

          # Fichier Maven
          --file pom.xml

  # ─────────────────────────────────────────────────────────────
  # JOB 3 : Docker Build & Push
  # ─────────────────────────────────────────────────────────────

  # Nom technique job
  docker:

    # Nom visible GitHub
    name: Docker Build & Push

    # Machine Ubuntu
    runs-on: ubuntu-latest

    # Attend build-and-test
    needs: build-and-test

    # startsWith
    # job lancé seulement sur tag v*
    # ex : v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')

    # Étapes
    steps:

      # Télécharger code
      - name: Checkout code

        uses: actions/checkout@v4

      # Installer Java
      - name: Set up JDK 17 (pour le build Maven)

        uses: actions/setup-java@v4

        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Créer fichier JAR
      - name: Build JAR (skip tests - déjà fait)

        # package = build application
        # -DskipTests = ignore tests
        run: mvn -B package -DskipTests --file pom.xml

      # Extraire version tag
      - name: Extract tag version

        # id utilisé plus tard
        id: version

        # récupère version du tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Connexion Docker Hub
      - name: Login to Docker Hub

        # Action officielle Docker login
        uses: docker/login-action@v3

        with:

          # Username Docker Hub
          username: ${{ secrets.DOCKERHUB_USERNAME }}

          # Token Docker Hub
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build image Docker + push
      - name: Build and push Docker image

        # Action Docker officielle
        uses: docker/build-push-action@v5

        with:

          # Dossier build Docker
          context: .

          # push:true = envoyer image vers Docker Hub
          push: true

          # Tags Docker image
          tags: |

            # Image versionnée
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-backend:${{ steps.version.outputs.VERSION }}

            # Dernière version
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-backend:latest