# Logger d'acc脙茠脗篓s s脙茠脗漏curit脙茠脗漏 (INFO = tous, WARN = s脙茠脗漏curit脙茠脗漏 seule)
logging.level.security.access=INFO
# Logger rate limit
logging.level.com.elearning.ProjetPfe.security.RateLimitFilter=WARN
# Logger JWT
logging.level.com.elearning.ProjetPfe.security.JwtFilter=WARN
# Logger global erreurs
logging.level.com.elearning.ProjetPfe.exception=WARN
# D脙茠脗漏sactiver les logs SQL en prod (mettre false en production)
spring.jpa.show-sql=false
# Format du log : include la date, le niveau, le thread et le logger court
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n