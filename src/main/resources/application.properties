spring.application.name=ProjetPfe
spring.config.import=optional:file:.env[.properties]
# SERVER
server.port=8083
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# DATABASE
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/lms_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# JWT
jwt.secret=${JWT_SECRET}
# Expiration du token : 7 200 000 ms = 2 heures
jwt.expiration=${JWT_EXPIRATION:7200000}
# EMAIL (GMAIL)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# CORS Configuration - Development
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
# FILE UPLOAD
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# GOOGLE OAUTH2
google.client.id=${GOOGLE_CLIENT_ID:}
# FACE ID SERVICE
face.service.url=${FACE_SERVICE_URL:http://localhost:8082}
face.service.secret=${FACE_SERVICE_SECRET:}
# Upload directory
app.upload.dir=uploads
# STRIPE
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY:pk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
# URLs de redirection apres paiement
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:4200/student/student-my-courses}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:4200/courses}
# PLATFORM SETTINGS
# Commission plateforme sur chaque vente (0.70 = 70% admin / 30% instructor)
app.platform.commission.rate=0.60
# Nombre maximum de cours featured en meme temps
app.featured.max.courses=10

# MONGODB SIDECAR (logs chatbot, sessions IA, analytics)
# IMPORTANT: MySQL reste la base m脙茠脗漏tier principale (34 tables inchang脙茠脗漏es)
app.mongo.enabled=true
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/lms_ai_logs}
spring.data.mongodb.auto-index-creation=true
# Auto-scan Mongo auto-config d脙茠脗漏sactiv脙茠脗漏; scan explicite via MongoSidecarConfig (@EnableMongoRepositories)
spring.data.mongodb.repositories.enabled=false

# CHATBOT VISITEUR (Hugging Face Inference API)
app.chatbot.hf.api-url=https://api-inference.huggingface.co/models
app.chatbot.hf.model=google/flan-t5-base
app.chatbot.hf.token=${HF_TOKEN:}
app.chatbot.python-service.url=${CHATBOT_PYTHON_SERVICE_URL:http://localhost:8090/chat/reply}
app.chatbot.python-service.base-url=${CHATBOT_PYTHON_SERVICE_BASE_URL:http://localhost:8090}
app.chatbot.python-service.agent-api-key=${CHATBOT_AGENT_API_KEY:}
app.chatbot.max-new-tokens=220
app.chatbot.temperature=0.4
app.chatbot.top-p=0.9

